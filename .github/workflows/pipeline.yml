
name: Deploy to VPS

on:
  push:
    branches:
      - main  # Change to your deployment branch if needed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the code
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 2: Set up SSH
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    # Step 3: Deploy to VPS
    - name: Deploy Code to VPS
      run: |
        ssh -vvv -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << 'EOF'
        cd /home/deployerdev/coding/projects/primelogic-solutions/backend/

        # Pull latest changes
        git pull origin main

        # Install dependencies
        pnpm install --frozen-lockfile

        # Build the project
        pnpm build

        # Restart the service using PM2 or systemd
        pm2 restart my-backend || pm2 start dist/src/server.js --name "my-backend"
        pm2 save 
        EOF
